<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Subs">
  <meta name="theme-color" content="#0f0f12">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" href="icon-192.png">
  <title>Subscription Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Subscriptions</h1>
      <p class="subtitle" id="monthlyTotal">$0.00 / month</p>
    </header>

    <section class="summary" id="summary">
      <div class="summary-card">
        <span class="summary-label">Active</span>
        <span class="summary-value" id="activeCount">0</span>
      </div>
      <div class="summary-card">
        <span class="summary-label">Next 7 days</span>
        <span class="summary-value" id="upcomingCount">0</span>
      </div>
      <div class="summary-card">
        <span class="summary-label">Yearly</span>
        <span class="summary-value" id="yearlyTotal">$0</span>
      </div>
    </section>

    <main class="list" id="subscriptionList"></main>

    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📋</div>
      <h2>No subscriptions yet</h2>
      <p>Tap + to add your first one</p>
    </div>

    <button class="fab" id="addBtn" aria-label="Add subscription">+</button>
  </div>

  <dialog class="modal" id="modal">
    <form id="form" method="dialog">
      <div class="modal-header">
        <h2 id="modalTitle">Add Subscription</h2>
        <button type="button" class="close-btn" id="closeBtn" aria-label="Close">&times;</button>
      </div>

      <label>
        Name
        <input type="text" id="name" placeholder="Netflix, Spotify…" required autocomplete="off">
      </label>

      <label>
        Amount
        <div class="input-prefix">
          <span>$</span>
          <input type="number" id="amount" placeholder="9.99" step="0.01" min="0" required inputmode="decimal">
        </div>
      </label>

      <label>
        Billing cycle
        <select id="cycle">
          <option value="weekly">Weekly</option>
          <option value="monthly" selected>Monthly</option>
          <option value="yearly">Yearly</option>
        </select>
      </label>

      <label>
        Next billing date
        <input type="date" id="nextDate" required>
      </label>

      <label>
        Category
        <select id="category">
          <option value="entertainment">Entertainment</option>
          <option value="music">Music</option>
          <option value="productivity">Productivity</option>
          <option value="fitness">Fitness</option>
          <option value="cloud">Cloud / Storage</option>
          <option value="news">News</option>
          <option value="other">Other</option>
        </select>
      </label>

      <div class="form-actions">
        <button type="button" class="btn btn-danger" id="deleteBtn" hidden>Delete</button>
        <button type="submit" class="btn btn-primary" id="saveBtn">Save</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
